<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>관리자 로그인</title></head>
<body>
<h2>🔐 관리자 로그인</h2>
<form method="POST">
  <input type="text" name="id" placeholder="아이디 입력" required><br>
  <input type="password" name="password" placeholder="비밀번호 입력" required><br>
  <button type="submit">로그인</button>
</form>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
</body>
</html>
